<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PyInterview AI - Question</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            color: #eaeaea;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        .question-box {
            background-color: #2a2a2a;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #333;
            margin-top: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        .question-text {
            font-size: 18px;
            margin-bottom: 20px;
            color: #eaeaea;
            line-height: 1.5;
        }

        /* ⏱ TIMER */
        .timer {
            text-align: center;
            font-size: 20px;
            margin-bottom: 20px;
            color: #ffc107;
            font-weight: bold;
        }

        /* 📝 TEXTAREA */
        textarea {
            width: 100%;
            height: 180px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background-color: #1f1f1f;
            color: #eaeaea;
            font-size: 15px;
            resize: none;
        }

        textarea:focus {
            outline: none;
            border-color: #4caf50;
        }

        /* 🔘 BUTTON */
        .btn-submit {
            margin-top: 15px;
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            background-color: #4caf50;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-submit:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }

        /* ⛔ DISABLED STATE */
        .disabled {
            opacity: 0.5;
        }

        /* 🔙 BACK LINK */
        .back {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #aaa;
            text-decoration: none;
        }

        .back:hover {
            color: #fff;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>🧠 Interview Mode</h1>

    <!-- ⏱ TIMER -->
    <div class="timer">
        ⏱ Time left: <span id="timer">{{ timer|default:60 }}</span> sec
    </div>

    <!-- 📦 QUESTION CARD -->
    <div class="question-box">

        <div class="question-text">
            {{ question.text }}
        </div>

        <form id="answerForm" method="POST" action="/result/">
            {% csrf_token %}

            <input type="hidden" name="question_id" value="{{ question.id }}">

            <textarea
                name="answer"
                id="answer"
                placeholder="Write your answer like in real interview..."
            ></textarea>

            <button class="btn-submit" type="submit">
                Submit Answer
            </button>
        </form>

    </div>

    <a class="back" href="/">← Back to home</a>

</div>

<!-- ⏱ TIMER SCRIPT -->
<script>
    let timeLeft = {{ timer|default:60 }};

    const timerEl = document.getElementById("timer");
    const form = document.getElementById("answerForm");
    const answerBox = document.getElementById("answer");

    const countdown = setInterval(() => {
        timeLeft--;
        timerEl.textContent = timeLeft;

        if (timeLeft <= 0) {
            clearInterval(countdown);

            timerEl.textContent = "0";

            answerBox.disabled = true;
            answerBox.classList.add("disabled");

            form.submit();
        }
    }, 1000);
</script>

</body>
</html>
