<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyInterview AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #030712;
            --sidebar-bg: rgba(17, 24, 39, 0.9);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f9fafb;
            --muted: #9ca3af;
            --accent: #38bdf8;
            --error: #ef4444;
            --success: #10b981;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .page-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
            max-width: 1600px;
            margin: auto;
        }

        .workspace {
            flex: 2;
            padding: 30px 40px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .nav-header { margin-bottom: 20px; }

        .btn-back {
            text-decoration: none;
            color: var(--muted);
            font-size: 14px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
            padding: 8px 0;
        }

        .btn-back:hover { color: var(--accent); }

        .timer-box {
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid rgba(255, 193, 7, 0.2);
            padding: 8px 16px;
            border-radius: 10px;
            color: #ffc107;
            font-family: 'JetBrains Mono';
            font-weight: bold;
            margin-bottom: 20px;
            align-self: flex-start;
        }

        h2 { margin: 0 0 25px 0; font-weight: 800; line-height: 1.3; }

        .editor-container {
            background: #000;
            border: 1px solid var(--border);
            border-radius: 16px;
            height: 35vh;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            transition: border-color 0.2s;
        }

        .editor-container:focus-within { border-color: var(--accent); }

        textarea#user-answer {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: #d1d5db;
            padding: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            line-height: 1.6;
            outline: none;
            resize: none;
        }

        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }

        .voice-btn {
            width: 54px;
            height: 54px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .voice-btn:hover { background: rgba(255, 255, 255, 0.1); }

        .recording-active {
            background: var(--error) !important;
            border-color: transparent;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); }
            70% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .btn-submit {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

        .feedback-sidebar {
            flex: 1;
            max-width: 380px;
            background: var(--sidebar-bg);
            border-left: 1px solid var(--border);
            padding: 30px;
            overflow-y: auto;
        }

        .ai-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 14px;
            line-height: 1.6;
        }
    </style>
</head>

<body>

<div class="page-wrapper">
    <main class="workspace">
        <div class="nav-header">
            <a href="{% url 'home' %}" class="btn-back">
                <span>←</span> Back to Dashboard
            </a>
        </div>

        <div class="timer-box">⏱ Time left: <span id="timer-val">--</span>s</div>

        <h2>{{ question.text }}</h2>

        <div class="editor-container">
            <textarea id="user-answer" placeholder="# start to write here or make voice message..."></textarea>
        </div>

        <div class="controls-row">
            <button id="voice-trigger" class="voice-btn" title="Voice input">🎤</button>
            <button class="btn-submit" id="submit-btn" onclick="submitAnswer()">
                <span>Submit Answer</span>
                <span id="submit-icon">➜</span>
            </button>
        </div>
    </main>

    <aside class="feedback-sidebar">
        <h3>✦ AI Mentor</h3>
        <div id="feedback-area">
            <div class="ai-card">Im waiting for your answer...</div>
        </div>
    </aside>
</div>

<script>
window.onload = function () {
    // --- Timer + auto stop mic ---
    let timerDisplay = document.getElementById('timer-val');
    let timeLeft = parseInt("{{ timer }}") || 60;

    const interval = setInterval(() => {
        timeLeft--;
        timerDisplay.textContent = timeLeft;

        if (timeLeft <= 0) {
            clearInterval(interval);
            stopMic(); // 🔥 stop recording when time ends
            submitAnswer();
        }
    }, 1000);

    // --- Voice Input ---
    const micBtn = document.getElementById('voice-trigger');
    const area = document.getElementById('user-answer');

    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!Speech) {
        micBtn.style.display = "none";
        return;
    }

    const recognition = new Speech();
    recognition.lang = "en-US"; // 🔥 important for interviews
    recognition.continuous = true;
    recognition.interimResults = true;

    let active = false;
    let isManualStop = false;
    let finalTranscript = "";

    micBtn.onclick = () => {
        if (!active) {
            finalTranscript = area.value;
            startMic();
        } else {
            stopMic();
        }
    };

    function startMic() {
        active = true;
        isManualStop = false;
        recognition.start();
        micBtn.classList.add("recording-active");
        micBtn.innerText = "🛑";
    }

    function stopMic() {
        active = false;
        isManualStop = true;
        recognition.stop();
        micBtn.classList.remove("recording-active");
        micBtn.innerText = "🎤";
    }

    recognition.onresult = (e) => {
        let interimTranscript = "";

        for (let i = e.resultIndex; i < e.results.length; i++) {
            let transcript = e.results[i][0].transcript;

            if (e.results[i].isFinal) {
                if (finalTranscript !== "" && !finalTranscript.endsWith(" ")) {
                    finalTranscript += " ";
                }
                finalTranscript += transcript;
            } else {
                interimTranscript += transcript;
            }
        }

        area.value = finalTranscript + interimTranscript;
        area.scrollTop = area.scrollHeight;
    };

    recognition.onend = () => {
        if (active && !isManualStop) recognition.start();
    };

    recognition.onerror = () => stopMic();

    // make stopMic доступною глобально для таймера
    window.stopMic = stopMic;
};

async function submitAnswer() {
    const btn = document.getElementById('submit-btn');
    const area = document.getElementById('user-answer');
    const feedbackArea = document.getElementById('feedback-area');

    if (btn.disabled || !area.value.trim()) return;

    btn.disabled = true;
    btn.querySelector('span').innerText = "Analyzing...";

    const formData = new FormData();
    formData.append("question_id", "{{ question.id }}");
    formData.append("answer", area.value);

    try {
        const response = await fetch("/result/", {
            method: "POST",
            headers: { "X-CSRFToken": "{{ csrf_token }}" },
            body: formData
        });

        const data = await response.json();

        feedbackArea.innerHTML = `
            <div class="ai-card">
                <h1 style="color:var(--accent); margin-top:0">${data.score}/10</h1>
                <p>${data.feedback}</p>
                <p style="font-size:0.85em; color:var(--muted); border-top:1px solid var(--border); padding-top:10px;">${data.improvement || ''}</p>
            </div>
        `;
    } catch (err) {
        feedbackArea.innerHTML = "error download.";
    } finally {
        btn.disabled = false;
        btn.querySelector('span').innerText = "Submit Answer";
    }
}
</script>

</body>
</html>
