{% extends "base.html" %}

{% block content %}
<style>
    .chat-wrapper {
        max-width: 1000px;
        margin: 40px auto;
        display: flex;
        flex-direction: column;
        height: 75vh;
        background: var(--sidebar-bg);
        backdrop-filter: blur(20px);
        border: 1px solid var(--border);
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    /* Header */
    .chat-header {
        padding: 20px 30px;
        background: rgba(255, 255, 255, 0.03);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .ai-avatar {
        width: 35px;
        height: 35px;
        background: linear-gradient(135deg, #38bdf8, #818cf8);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        color: #000;
    }

    /* Messages Area */
    .messages-container {
        flex-grow: 1;
        overflow-y: auto;
        padding: 30px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        scroll-behavior: smooth;
    }

    /* Scrollbar Styling */
    .messages-container::-webkit-scrollbar { width: 6px; }
    .messages-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    .message {
        max-width: 80%;
        padding: 14px 20px;
        border-radius: 18px;
        line-height: 1.6;
        font-size: 15px;
        animation: messageFade 0.3s ease-out;
    }

    @keyframes messageFade {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
        align-self: flex-end;
        background: var(--accent);
        color: #030712;
        font-weight: 500;
        border-bottom-right-radius: 4px;
    }

    .message.ai {
        align-self: flex-start;
        background: rgba(255, 255, 255, 0.05);
        color: #f3f4f6;
        border: 1px solid var(--border);
        border-bottom-left-radius: 4px;
    }

    /* Typing Indicator */
    .typing {
        font-style: italic;
        color: var(--muted);
        font-size: 13px;
        margin-left: 10px;
        display: none;
    }

    /* Input Area */
    .input-area {
        padding: 25px 30px;
        background: rgba(0, 0, 0, 0.2);
        border-top: 1px solid var(--border);
        display: flex;
        gap: 15px;
    }

    #chat-input {
        flex-grow: 1;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px 20px;
        color: white;
        font-family: inherit;
        outline: none;
        transition: 0.3s;
    }

    #chat-input:focus {
        border-color: var(--accent);
        background: rgba(255, 255, 255, 0.08);
    }

    .send-btn {
        background: var(--accent);
        border: none;
        border-radius: 12px;
        padding: 0 25px;
        color: #000;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
    }

    .send-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 15px var(--accent-glow);
    }
    
    pre {
        background: #000;
        padding: 15px;
        border-radius: 10px;
        overflow-x: auto;
        font-family: 'JetBrains Mono', monospace;
        font-size: 13px;
        margin: 10px 0;
        border: 1px solid var(--border);
    }
</style>

<div class="chat-wrapper">
    <div class="chat-header">
        <div class="ai-avatar">AI</div>
        <div>
            <div style="font-weight: 700; font-size: 16px;">Python Mentor</div>
            <div style="font-size: 12px; color: var(--success);">● Online / Ready to help</div>
        </div>
    </div>

    <div class="messages-container" id="chat-window">
        <div class="message ai">
            Привіт! Я твій Python-ментор. Запитуй будь-що про код, алгоритми або підготовку до інтерв'ю.
        </div>
    </div>

    <div id="typing-indicator" class="typing" style="padding: 0 30px 10px 30px;">AI замислився...</div>

    <div class="input-area">
        <input type="text" id="chat-input" placeholder="Запитайте про декоратори, контекстні менеджери..." autocomplete="off">
        <button class="send-btn" onclick="sendMessage()">Надіслати</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const chatInput = document.getElementById('chat-input');
    const typingIndicator = document.getElementById('typing-indicator');

    // Функція додавання повідомлення в інтерфейс
    function appendMessage(text, side) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${side}`;
        
        // Підтримка базового форматування коду, якщо AI надсилає блоки в ```
        if (text.includes('```')) {
            msgDiv.innerHTML = text.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
        } else {
            msgDiv.innerText = text;
        }
        
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function sendMessage() {
        const message = chatInput.value.trim();
        if (!message) return;

        // Очищаємо інпут і додаємо повідомлення юзера
        chatInput.value = '';
        appendMessage(message, 'user');

        // Показуємо індикатор завантаження
        typingIndicator.style.display = 'block';

        try {
            const response = await fetch("/ai-chat/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": "{{ csrf_token }}"
                },
                body: JSON.stringify({ message: message })
            });

            const data = await response.json();

            if (data.reply) {
                appendMessage(data.reply, 'ai');
            } else if (data.message) { // якщо ключ називається message
                appendMessage(data.message, 'ai');
            } else {
                appendMessage("Вибач, я не зміг обробити цей запит.", "ai");
            }
        } catch (error) {
            appendMessage("Помилка зв'язку з сервером.", "ai");
            console.error(error);
        } finally {
            typingIndicator.style.display = 'none';
        }
    }

    // Відправка по Enter
    chatInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') sendMessage();
    });
</script>
{% endblock %}
